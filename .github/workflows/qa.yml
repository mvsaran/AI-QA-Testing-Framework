name: AI QA Tests

on:
  push:
    paths:
      - "AIQATestingFramework/**"
  pull_request:
    paths:
      - "AIQATestingFramework/**"
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AIQATestingFramework

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_API_BASE_URL: ${{ secrets.RAG_API_BASE_URL }}
        run: |
          pytest --junitxml reports/junit.xml --html reports/report.html --self-contained-html

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiqa-reports
          path: |
            AIQATestingFramework/reports/
